version: "3.8"

services:
  admin-service:
    build: ./services/admin-service
    container_name: admin-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - devops-net
    volumes:
      - admin-data:/app/data

  service-a:
    build: ./services/service-a
    container_name: service-a
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - admin-service
    networks:
      - devops-net

  service-b:
    build: ./services/service-b
    container_name: service-b
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - admin-service
    networks:
      - devops-net

  service-c:
    build: ./services/service-c
    container_name: service-c
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      - admin-service
    networks:
      - devops-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge

volumes:
  admin-data:
  qdrant-data:

  